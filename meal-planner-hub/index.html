<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Weekly Table — Meal Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'DM Sans', sans-serif; letter-spacing: -0.01em; }
    .serif-display { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-[#FBF9F6] text-[#2A2825] min-h-screen antialiased selection:bg-[#EAE4DA]">

  <div class="max-w-7xl mx-auto px-6 py-12 md:py-20">
    
    <header class="mb-16 md:mb-24 flex flex-col md:flex-row md:items-end md:justify-between gap-8 border-b border-[#EBE6DD] pb-10">
      <div class="max-w-2xl">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-amber-800/80 mb-3">Ritual & Nourishment</p>
        <h1 class="serif-display text-4xl md:text-6xl font-normal tracking-tight text-[#1E1D1B]">
          The Weekly <span class="italic font-light text-[#8C7A6B]">Table.</span>
        </h1>
        <p class="text-sm md:text-base text-[#6E6A64] mt-4 leading-relaxed font-light">
          A quiet space to intentionalize your meals. Your notes are saved directly to this device as you type, creating a seamless blueprint for your week ahead.
        </p>
      </div>
      
      <div class="flex items-center gap-6 text-sm text-[#5C5852]">
        <div class="font-light">
          Logged <span id="global-progress" class="font-semibold text-[#1E1D1B]">0 of 21</span> moments
        </div>
        <div class="h-4 w-[1px] bg-[#EBE6DD]"></div>
        <button onclick="clearAllMeals()" class="text-xs font-medium uppercase tracking-wider text-gray-400 hover:text-red-700 transition-colors duration-300">
          Reset Grid
        </button>
      </div>
    </header>

    <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-7 gap-x-6 gap-y-12">
      </div>
  </div>

  <script>
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const slots = ['Breakfast', 'Lunch', 'Dinner'];

    function initPlanner() {
      const container = document.getElementById('grid-container');
      container.innerHTML = '';
      let filledCount = 0;

      // Detect current day to emphasize human awareness in design
      const todayName = new Date().toLocaleDateString('en-US', { weekday: 'long' });

      days.forEach(day => {
        const dayCard = document.createElement('div');
        const isToday = todayName === day;
        
        // Premium, intentional card container spacing
        dayCard.className = `flex flex-col gap-6 transition-all duration-300 ${isToday ? 'opacity-100' : 'opacity-95'}`;
        
        let slotsHtml = '';

        slots.forEach(slot => {
          const storageKey = `${day}-${slot}`;
          const savedValue = localStorage.getItem(storageKey) || '';
          if(savedValue.trim() !== '') filledCount++;

          slotsHtml += `
            <div class="flex flex-col gap-1 group/item">
              <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-gray-400 group-focus-within/item:text-[#8C7A6B] transition-colors duration-300">
                ${slot}
              </label>
              <input 
                type="text" 
                value="${savedValue}" 
                placeholder="—" 
                class="w-full text-sm text-[#2A2825] bg-transparent border-b border-[#EBE6DD] py-2 focus:outline-none focus:border-[#8C7A6B] placeholder-gray-300 transition-colors duration-300 font-light"
                oninput="saveMealItem('${day}', '${slot}', this.value)"
              />
            </div>
          `;
        });

        dayCard.innerHTML = `
          <div class="flex flex-col h-full justify-between">
            <div>
              <div class="flex items-baseline justify-between mb-4">
                <h2 class="serif-display text-xl font-medium tracking-tight text-[#1E1D1B] flex items-center gap-2">
                  ${day}
                </h2>
                ${isToday ? '<span class="text-[10px] font-semibold uppercase tracking-widest text-[#8C7A6B] bg-[#F2EDE4] px-2 py-0.5 rounded">Today</span>' : ''}
              </div>
              <div class="flex flex-col gap-5 mt-2">
                ${slotsHtml}
              </div>
            </div>
          </div>
        `;

        container.appendChild(dayCard);
      });

      document.getElementById('global-progress').innerText = `${filledCount} of 21`;
    }

    function saveMealItem(day, slot, value) {
      localStorage.setItem(`${day}-${slot}`, value);
      updateGlobalCounter();
    }

    function updateGlobalCounter() {
      let filledCount = 0;
      days.forEach(day => {
        slots.forEach(slot => {
          if((localStorage.getItem(`${day}-${slot}`) || '').trim() !== '') filledCount++;
        });
      });
      document.getElementById('global-progress').innerText = `${filledCount} of 21`;
    }

    function clearAllMeals() {
      if(confirm("Are you sure you want to clear your current weekly table?")) {
        localStorage.clear();
        initPlanner();
      }
    }

    initPlanner();
  </script>
</body>
</html>
